name: CI

on:
  push:
    branches-ignore:
      - main          # main is protected — never push directly
  pull_request:
    branches:
      - "feature/**"
      - develop

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── Lint & type-check ─────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src

      - name: Ruff format check
        run: ruff format --check src

      - name: Mypy
        run: mypy src

  # ── Unit tests ────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=kit_mcp --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit-${{ matrix.python-version }}

  # ── Integration tests (mocked) ────────────
  integration-tests:
    name: Integration Tests (mocked)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ── Docker build ──────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context : .
          push    : false
          tags    : kit-mcp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to  : type=gha,mode=max
